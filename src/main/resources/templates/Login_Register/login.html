<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-custom">
        <div class="container-fluid">
            <a class="nav-link" href="#">Trang Chủ</a>
            <a class="nav-link" href="#">Điều Khoản</a>
        </div>
    </nav>
    <!-- Main content -->
    <div class="container-fluid main-container">
        <!-- Left image -->
        <div class="left-img">
            <img th:src="@{/images/chef.png}" alt="Chef Image">
        </div>
        <!-- Login form -->
        <div class="login-form">
            <form class="login-box">
                <div class="login-title">ĐĂNG NHẬP</div>
                <div class="mb-3">
                    <label for="username" class="form-label">Số điện thoại</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-phone"></i></span>
                        <input type="text" class="form-control" id="username" name="username" required placeholder="Nhập số điện thoại">
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Mật Khẩu</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="password" name="password" required placeholder="Nhập mật khẩu">
                    </div>
                </div>
                <div class="mb-2 d-flex justify-content-end">
                    <a href="#" style="color:#0000e6; text-decoration:none; font-weight:500;">Quên mật khẩu?</a>
                </div>
                <div class="d-flex justify-content-between">
                    <button type="submit" class="btn btn-login">Đăng Nhập</button>
                    <button type="button" class="btn btn-register">Đăng Ký</button>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
